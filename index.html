<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Interactive Card Hand Demo</title>
  <style>
    :root {
      --card-width: min(30vw, 138px);
      --card-height: calc(var(--card-width) * 1.42);
      --overlap: calc(var(--card-width) * -0.36);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background:
        radial-gradient(circle at 50% 12%, rgba(84, 126, 185, 0.65), transparent 36%),
        radial-gradient(circle at 15% 80%, rgba(111, 60, 156, 0.38), transparent 36%),
        linear-gradient(145deg, #0f172a, #111827 52%, #030712);
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
    }

    header,
    footer {
      text-align: center;
      pointer-events: none;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 auto;
      max-width: 620px;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(0.95rem, 3vw, 1.1rem);
    }

    .stage {
      position: relative;
      display: grid;
      place-items: end center;
      perspective: 1100px;
      perspective-origin: 50% 58%;
      padding-bottom: min(12vh, 72px);
      touch-action: none;
    }

    .glow {
      position: absolute;
      bottom: 4vh;
      width: min(86vw, 620px);
      height: 18vh;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
      filter: blur(28px);
      transform: rotateX(72deg);
      pointer-events: none;
    }

    .hand {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      max-width: 760px;
      transform-style: preserve-3d;
      touch-action: none;
    }

    .card {
      position: relative;
      width: var(--card-width);
      height: var(--card-height);
      margin-left: var(--overlap);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: clamp(14px, 4vw, 22px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(225, 230, 241, 0.96)),
        linear-gradient(135deg, #ffffff, #cbd5e1);
      color: #0f172a;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.35);
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(10px, 2.5vw, 16px);
      transform-style: preserve-3d;
      transition: box-shadow 140ms ease, filter 140ms ease;
      will-change: transform;
      touch-action: none;
      cursor: grab;
      isolation: isolate;
    }

    .card:first-child { margin-left: 0; }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at var(--shine-x, 50%) var(--shine-y, 30%), rgba(255, 255, 255, 0.78), transparent 38%);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: screen;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: calc(clamp(14px, 4vw, 22px) - 7px);
      border: 2px solid rgba(15, 23, 42, 0.12);
      pointer-events: none;
    }

    .card.active {
      z-index: 20;
      box-shadow: 0 38px 74px rgba(0, 0, 0, 0.55);
      filter: saturate(1.1);
      cursor: grabbing;
    }

    .card.active::before { opacity: 1; }

    .corner,
    .pip {
      position: relative;
      z-index: 3;
      pointer-events: none;
    }

    .corner {
      font-weight: 900;
      font-size: clamp(1rem, 4.4vw, 1.55rem);
      line-height: 0.9;
      transform: translateZ(26px);
    }

    .corner.bottom {
      justify-self: end;
      align-self: end;
      transform: rotate(180deg) translateZ(26px);
    }

    .pip {
      place-self: center;
      font-size: clamp(2.7rem, 12vw, 5.4rem);
      line-height: 1;
      text-shadow: 0 8px 18px rgba(15, 23, 42, 0.15);
      transform: translateZ(46px);
    }

    .red { color: #dc2626; }

    .card:nth-child(1) { --base-z: -24deg; --base-y: 34px; }
    .card:nth-child(2) { --base-z: -13deg; --base-y: 13px; }
    .card:nth-child(3) { --base-z: -3deg; --base-y: 0px; }
    .card:nth-child(4) { --base-z: 8deg; --base-y: 8px; }
    .card:nth-child(5) { --base-z: 20deg; --base-y: 30px; }

    .card {
      transform: translateY(var(--base-y)) rotateZ(var(--base-z));
    }

    footer {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.85rem;
    }

    @media (max-width: 420px) {
      :root {
        --card-width: 31vw;
        --overlap: calc(var(--card-width) * -0.44);
      }

      .stage { padding-bottom: 8vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Interactive Card Hand</h1>
    <p>Press and drag a card. Mobile gestures, text selection, and callouts are disabled.</p>
  </header>

  <main class="stage" aria-label="Interactive playing-card hand demo">
    <div class="glow"></div>
    <section class="hand">
      <article class="card" data-card><div class="corner">A<br>♠</div><div class="pip">♠</div><div class="corner bottom">A<br>♠</div></article>
      <article class="card red" data-card><div class="corner">K<br>♥</div><div class="pip">♥</div><div class="corner bottom">K<br>♥</div></article>
      <article class="card red" data-card><div class="corner">Q<br>♦</div><div class="pip">♦</div><div class="corner bottom">Q<br>♦</div></article>
      <article class="card" data-card><div class="corner">J<br>♣</div><div class="pip">♣</div><div class="corner bottom">J<br>♣</div></article>
      <article class="card" data-card><div class="corner">10<br>♠</div><div class="pip">♠</div><div class="corner bottom">10<br>♠</div></article>
    </section>
  </main>

  <footer>Best tested as a saved Home Screen app or full-page GitHub Pages site.</footer>

  <script>
    const cards = [...document.querySelectorAll('[data-card]')];
    let activeCard = null;
    let pointerId = null;
    let rafId = null;

    const state = {
      x: 0.5,
      y: 0.5,
      currentX: 0.5,
      currentY: 0.5
    };

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('gesturechange', event => event.preventDefault());
    document.addEventListener('gestureend', event => event.preventDefault());
    document.addEventListener('selectstart', event => event.preventDefault());
    document.addEventListener('contextmenu', event => event.preventDefault());

    let lastTouchEnd = 0;
    document.addEventListener('touchend', event => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    function updateTargetFromEvent(event) {
      if (!activeCard) return;
      const rect = activeCard.getBoundingClientRect();
      state.x = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      state.y = Math.min(1, Math.max(0, (event.clientY - rect.top) / rect.height));
    }

    function animate() {
      if (!activeCard) return;

      state.currentX += (state.x - state.currentX) * 0.24;
      state.currentY += (state.y - state.currentY) * 0.24;

      const rotateY = (state.currentX - 0.5) * 28;
      const rotateX = (0.5 - state.currentY) * 28;
      const shineX = state.currentX * 100;
      const shineY = state.currentY * 100;

      activeCard.style.setProperty('--shine-x', `${shineX}%`);
      activeCard.style.setProperty('--shine-y', `${shineY}%`);
      activeCard.style.transform = `translateY(-54px) scale(1.12) rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(0deg)`;

      rafId = requestAnimationFrame(animate);
    }

    function startInteraction(card, event) {
      if (activeCard && activeCard !== card) endInteraction();

      activeCard = card;
      pointerId = event.pointerId;
      card.setPointerCapture(pointerId);
      card.classList.add('active');
      updateTargetFromEvent(event);
      state.currentX = state.x;
      state.currentY = state.y;

      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(animate);
    }

    function endInteraction() {
      if (!activeCard) return;
      cancelAnimationFrame(rafId);
      activeCard.classList.remove('active');
      activeCard.style.transform = '';
      activeCard.style.removeProperty('--shine-x');
      activeCard.style.removeProperty('--shine-y');
      activeCard = null;
      pointerId = null;
    }

    cards.forEach(card => {
      card.addEventListener('pointerdown', event => {
        event.preventDefault();
        startInteraction(card, event);
      });

      card.addEventListener('pointermove', event => {
        if (activeCard !== card || event.pointerId !== pointerId) return;
        event.preventDefault();
        updateTargetFromEvent(event);
      });

      card.addEventListener('pointerup', event => {
        if (event.pointerId === pointerId) endInteraction();
      });

      card.addEventListener('pointercancel', endInteraction);
      card.addEventListener('lostpointercapture', endInteraction);
    });
  </script>
</body>
</html>
